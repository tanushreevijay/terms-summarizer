<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>T&C Summary</title>
    <style>
        :root {
            --bg: #f8f5f0;
            --ink: #1f1f1f;
            --muted: #6b6b6b;
            --accent: #0f766e;
            --card: #ffffff;
            --border: #e6e1d8;
        }
        body {
            margin: 0;
            padding: 16px;
            background: var(--bg);
            color: var(--ink);
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            width: 320px;
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            letter-spacing: 0.3px;
        }
        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            margin-top: 12px;
            white-space: pre-wrap;
        }
        .label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }
        #risk {
            font-weight: 700;
        }
    </style>
</head>
<body>

<h2>Terms & Conditions Summary</h2>

<button id="summarize">Analyze</button>

<div class="card">
    <div class="label">Summary</div>
    <div id="summary">—</div>
</div>

<div class="card">
    <div class="label">Warnings</div>
    <div id="warnings">—</div>
</div>

<div class="card">
    <div class="label">Risk</div>
    <div id="risk">—</div>
</div>

<script src="popup.js"></script>

</body>
</html>
